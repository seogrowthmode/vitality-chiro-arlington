name: Offer Copy Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  offer-copy-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check offer copy
        run: npm run guard:offer-copy
